<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join</title>
    <script src="../JS/addtask.js"></script>
    <script src="../JS/script.js"></script>
    <link rel="stylesheet" href="../styles/fonts.css">
    <link rel="stylesheet" href="../styles/response.css">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/taskstyle.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>

<body onload="renderContent()">
    <div class="start_logo">
        <img src="../img/Capa 1.png" alt="">
    </div>
    <div class="login_section">
        <div class="header">
            <div>
                <button class="registry" id="registry">Not a Join User?</button>
                <a href="sign_up.html"><button class="sign_up" id="signUp">Sign up</button></a>
            </div>
        </div>
        <div class="login_window" id="loginWindow">
            <div>
                <h1>Log in</h1>
            </div>
            <form class="login_input" action="onsubmit">
                <div class="input_fields">
                    <div class="input_email">
                        <input type="email" placeholder="Email" required>
                        <img src="../img/mailicon.png">
                    </div>
                    <div class="input_password">
                        <input type="password" placeholder="Password" required>
                        <img src="../img/lock.png">
                    </div>
                </div>
                <div class="checkbox">
                    <div>
                        <input type="checkbox">
                        <span>Remember me</span>
                    </div>
                    <a class="forgot_password_link" href="forgot_password.html"><span class="forgot_password">Forgot my password</span></a>
                </div>
                <div class="login_buttons">
                    <button class="login_button" id="logInButton">Log in</button>
                    <button class="guest_login_button" id="guestLogInButton">Guest Log in</button>
                </div>
            </form>
        </div>
    </div>

</body>

</html>
