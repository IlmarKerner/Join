<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join - Add Task</title>
    <script src="../JS/addtask.js"></script>
    <script src="../JS/script.js"></script>
    <script src="../JS/includeHTML.js"></script>
    <script src="../JS/login.js"></script>
    <link rel="stylesheet" href="../styles/help.css">
    <link rel="stylesheet" href="../styles/response.css">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/taskstyle.css">
    <link rel="stylesheet" href="../styles/menu.css">
    <link rel="stylesheet" href="../styles/addTask.css">
    <link rel="stylesheet" href="../styles/fonts.css">
    <link rel="stylesheet" href="../styles/legal_notice.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>

<body onload="includeHTML()">
    <div class="add_task_container">
        <div class="menubar">
            <div w3-include-html="menu.html"></div>
        </div>
        <div class="headerbar">
            <div w3-include-html="headerbar.html"></div>
        </div>
        <div class="addtask">
            <h1>Add Task</h1>
            <div class="tasks">
                <div class="left_task">
                    <div class="title">
                        <p>Title</p>
                        <input type="text" placeholder="Enter a title">
                    </div>
                    <div class="description">
                        <p>Description</p>
                        <textarea type="text" placeholder="Enter a description"></textarea>
                    </div>
                    <div>
                        <p class="category">Category</p>
                        <nav class="navbar1">
                            <label for="touch"><span>Select task category</span></label>
                            <input type="checkbox" id="touch">
                            <div class="slide">
                                <div onclick="newCategory()">New Category</div>
                                <div onclick="sales()">Sales</div>
                                <div onclick="backoffice()">Backoffice</div>
                            </div>
                        </nav>
                    </div>
                    <div>
                        <p class="category2">Assignet to</p>
                        <nav class="navbar2">
                            <label for="touch2"><span>Select contacts to assign</span></label>
                            <input type="checkbox" id="touch2">
                            <div class="slide2">
                                <div onclick="">New Category</div>
                                <div onclick="">Sales</div>
                                <div onclick="">Backoffice</div>
                            </div>
                        </nav>
                    </div>
                </div>
                <div class="bar">
                    <img src="../img/bar.png" alt="">
                </div>
                <div class="right-task">
                    <div class="date">
                        <p>Due date</p>
                        <input type="date" placeholder="dd/mm/yyyy">
                    </div>
                    <div class="prio">
                        <p>Prio</p>
                        <div class="devision">
                            <div class="urgent">Urgent<img src="../img/urgent.png"></div>
                            <div class="medium">Medium <img src="../img/medium.png"></div>
                            <div class="low">Low <img src="../img/low.png"></div>
                        </div>
                    </div>
                    <p class="subtaskheader">Subtasks</p>
                    <div class="subtask">
                        <p></p>
                        <input type="text" placeholder="Add new subtask"><img src="../img/addsubtask.png" id="addTask" onclick="addTask()">
                    </div>

                    <div class="subtasks">
                        <div><input type="checkbox">Subtask 1</div>
                    </div>
                </div>
                <div class="task_buttons">
                    <button class="clear_button" id="clearButton" onclick="clearAddTask()">Clear<img src="../img/clear.png"></button>
                    <button class="create_button" id="createButton" onclick="createTask()">Create Task <img src="..//img/create_task.png"></button>
                </div>
            </div>

        </div>
    </div>
</body>

</html>
