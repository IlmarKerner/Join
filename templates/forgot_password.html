<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>Join</title>
    <script src="../JS/login.js"></script>
    <script src="../JS/addtask.js"></script>
    <script src="../JS/script.js"></script>
    <link rel="stylesheet" href="../styles/fonts.css">
    <link rel="stylesheet" href="../styles/response.css">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/taskstyle.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">

<body onload="renderContent()">
    <div class="start_logo">
        <img src="../img/Capa 1.png" alt="">
    </div>
    <div class="login_section">
        <div class="forgot_window" id="forgotWindow">
            <div>
                <h1>I forgot my password</h1>
            </div>
            <div class="go_back_to_login" id="goBackToLogin">
                <a href="index.html"><img src="../img/arrow_back.png"></a>
            </div>
            <div class="no_panic">
                <span>Don't worry! We will send you an email with the instructions to <br> reset your password.</span>
            </div>
            <form action="http://gruppe-329.developerakademie.net/Join/templates/send_mail.php" method="post">
                <div class="input_fields">
                        <div class="input_email">
                            <input name="name" type="email" placeholder="Email" required>
                            <img name="message" src="../img/mailicon.png">
                        </div>
                </div>
                <div class="signup_container">
                    <button type="submit" class="forgot_button" id="forgotButton">Send me the Email</button>
                </div>
            </form>
        </div>
    </div>

</body>

</html>
