<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join - Contacts</title>
    <script src="../JS/addtask.js"></script>
    <script src="../JS/script.js"></script>
    <script src="../JS/includeHTML.js"></script>
    <script src="../JS/login.js"></script>
    <script src="../JS/addcontact.js"></script>
    <script src="../JS/board.js"></script>
    <link rel="stylesheet" href="../styles/addTaskPopup.css">
    <link rel="stylesheet" href="../styles/contactsPopup.css">
    <link rel="stylesheet" href="../styles/contacts.css">
    <link rel="stylesheet" href="../styles/help.css">
    <link rel="stylesheet" href="../styles/response.css">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/taskstyle.css">
    <link rel="stylesheet" href="../styles/menu.css">
    <link rel="stylesheet" href="../styles/addTask.css">
    <link rel="stylesheet" href="../styles/fonts.css">
    <link rel="stylesheet" href="../styles/legal_notice.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>

<body onload="includeHTML()">
    <div class="contacts_container blur_container" id="contactsContainer">
        <div class="menubar">
            <div w3-include-html="menu.html"></div>
        </div>
        <div class="headerbar">
            <div w3-include-html="headerbar.html"></div>
        </div>
        <div class="contacts">
            <div class="listning" id="listning"></div>

            <div class="right_side">
                <div class="right_side_contacts">
                    <p>Contacts</p>
                    <img src="../img/separation.png">
                    <h4>Better with a team</h4>
                </div>
                <div class="full_contact_Info_Container" id="full_contact_Info_Container"></div>
            </div>
            <div class="new_contact_button" id="newContact" onclick="openNewContactWindow()">
                <p>New contact</p>
                <img src="../img/addcontact.png">
            </div>
        </div>
    </div>
    <div id="contact_popup_window">

    </div>
    <div class="popup d-none" id="popupAddContact">
        <div class="popup_window">
            <div class="popup_left">
                <div class="popup_left_img">
                    <img src="../img/joinlogo4.png">
                </div>
                <h1>Add contact</h1>
                <p>Tasks are better with a team!</p>
                <img src="../img/underline.png">
            </div>
            <div class="close_contact_popup" id="closeContactWindow" onclick="closeNewContactWindow()">
                <img id="close_contact_btn" src="../img/clear.png">
            </div>
            <div class="popup_right">
                <div class="popup_right_profile">
                    <img src="../img/profileicon2.png">
                </div>
                <div class="popup_right_buttons">
                    <div class="cancel">
                        <p>Cancel</p>
                        <img src="../img/clear.png">
                    </div>
                    <div class="create_contact" onclick="getInfoFromNewContactField()">
                        <p>Create contact</p>
                        <img src="../img/create_task.png">
                    </div>

                </div>
                <div class="fill_in_fields">
                    <div class="first_name">
                        <input type="text" placeholder="First name" required id="firstname">
                        <img src="../img/profileicon3.png">
                    </div>
                    <div class="last_name">
                        <input type="text" placeholder="Last name" required id="secondname">
                        <img src="../img/profileicon3.png">
                    </div>
                    <div class="email_field">
                        <input type="email" placeholder="Email" required id="email">
                        <img src="../img/mailicon.png">
                    </div>
                    <div class="phone_field">
                        <input type="tel" placeholder="Phone" required id="phone">
                        <img src="../img/phone-line.png">
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="addtask_popup d-none" id="addtaskPopupWindowForContact">

    </div>
</body>

</html>
