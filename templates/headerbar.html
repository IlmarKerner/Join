<!DOCTYPE html>
<html lang="en">

<style>

    body {
        margin: 0;
    }

    .headerbar {
        position: absolute;
        width: 100%;
        height: 89px;
        left: 0px;
        top: 0px;
        z-index: 2;
    }
    
    .profilebar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        height: 89px;
        background-color: #ffffff;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.4);
    }
    
    .profilebar p {
        position: absolute;
        left: 348px;
        top: 32px;
        font-size: 21px;
        color: black;
        font-weight: 400;
    }
    
    .profile {
        display: flex;
        position: absolute;
        align-items: center;
        width: 106px;
        right: 10%;
        gap: 26px;
    }
    
    .profilepicture img {
        width: 49px;
        height: 49px;
        border-radius: 100%;
    }

    .profilebar_logo {
        display: none;
    }

    @media (max-width: 992px) {

        .add_task_container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .addtask {
            width: 80%;
        }

        .headerbar {
            position: fixed;
        }

        .profilebar {
            height: 80px;
        }

        .profilebar p {
            display: none;
        }

        .q_image {
            display: none;
        }

        .profilebar_logo {
            display: block;
            width: 32px;
            position: absolute;
            left: 5%;
        }

        .profile {
            right: 5%;
            width: unset;
        }

    }
</style>

<body>
    <div class="profilebar" id="profilebar">
        <img class="profilebar_logo" src="../img/Capa 1.png">
        <p>Kanban Project Management Tool</p>
        <div class="profile">
            <div class="q_image">
                <a href="help.html"><img src="../img/q-image.png"></a>
            </div>
            <div class="profilepicture">
                <img src="../img/profile.png">
            </div>
        </div>
    </div>
</body>

</html>
