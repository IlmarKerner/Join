<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join</title>
    <script src="../JS/addtask.js"></script>
    <script src="../JS/addcontact.js"></script>
    <script src="../JS/script.js"></script>
    <script src="../JS/includeHTML.js"></script>
    <!-- <script src="../JS/addcontact.js"></script> -->
    <script src="../JS/board.js"></script>
    <link rel="stylesheet" href="../styles/fonts.css">
    <link rel="stylesheet" href="../styles/response.css">
    <link rel="stylesheet" href="../styles/addTask.css">
    <link rel="stylesheet" href="../styles/addTaskPopup.css">
    <link rel="stylesheet" href="../styles/taskstyle.css">
    <link rel="stylesheet" href="../styles/menu.css">
    <link rel="stylesheet" href="../styles/board.css">
    <link rel="stylesheet" href="../styles/drag&droppopup.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>

<body onload="includeHTML(); initBoard()">
    <div w3-include-html="menu.html"></div>
    <div w3-include-html="headerbar.html"></div>
    <div class="board_content_parent" id="boardContentParent">
        <span class="tool_description">Kanban Project Management Tool</span>
        <div class="board_content">
            <div class="board_headline">
                <h1>
                    Board
                </h1>
                <div class="dFlex">
                    <div class="board_searchbar" id="boardSearchbar">
                        <input type="text" placeholder="Find Task">
                        <img src="../img/board_searchbar_icon.png">
                    </div>

                    <div class="board_add_task" id="boardAddTask">
                        <button onclick="openAddTaskPopup()">Add task</button>
                        <img src="../img/board_addTask_icon.png">
                    </div>
                </div>
            </div>

            <div class="board_overview">

                <div class="board_column">
                    <div class="board_column_headline">
                        <span>To Do</span>
                        <img src="../img/plus_button.png">
                    </div>
                    <div class="board_column_content" id="toDo" ondrop="drop('toDo')" ondragover="allowDrop(event)">
                        <!-- Cards get filled here -->

                    </div>
                    <div id="toDoDropPosition" ondrop="drop('toDo')" ondragover="allowDrop(event)" class="div_border dNone"></div>
                </div>

                <div class="board_column">
                    <div class="board_column_headline">
                        <span>In progress</span>
                        <img src="../img/plus_button.png">
                    </div>
                    <div class="board_column_content" id="inProgress" ondrop="drop('inProgress')" ondragover="allowDrop(event)">
                        <!-- Cards get filled here -->

                    </div>
                    <div id="inProgressDropPosition" class="div_border dNone" ondrop="drop('inProgress')" ondragover="allowDrop(event)"></div>
                </div>

                <div class="board_column">
                    <div class="board_column_headline">
                        <span>Awaiting Feedback</span>
                        <img src="../img/plus_button.png">
                    </div>
                    <div class="board_column_content" id="awaitingFeedback" ondrop="drop('awaitingFeedback')" ondragover="allowDrop(event)">
                        <!-- Cards get filled here -->

                    </div>
                    <div id="awaitingFeedbackDropPosition" ondrop="drop('awaitingFeedback')" ondragover="allowDrop(event)" class="div_border dNone"></div>
                </div>

                <div class="board_column">
                    <div class="board_column_headline">
                        <span>Done</span>
                        <img src="../img/plus_button.png">
                    </div>
                    <div class="board_column_content" id="done" ondrop="drop('done')" ondragover="allowDrop(event)">
                        <!-- Cards get filled here -->

                    </div>
                    <div id="doneDropPosition" class="div_border dNone" ondrop="drop('done')" ondragover="allowDrop(event)"></div>
                </div>

            </div>
            <div id="popUpArea" class="pop_up_area dNone">

            </div>
        </div>
    </div>

    <div class="addtask_popup d-none" id="addtaskPopupWindow">
        <div class="tasks_popup">
            <div class="close_addtask_popup" id="closeAddTaskWindow" onclick="closeAddTaskPopup()">
                <img src="../img/clear.png">
            </div>
            <h1>Add Task</h1>
            <div class="left_task_popup">
                <div class="title_popup">
                    <p>Title</p>
                    <input type="text" placeholder="Enter a title" id="title">
                </div>
                <div class="description_popup">
                    <p>Description</p>
                    <textarea type="text" placeholder="Enter a description" id="description"></textarea>
                </div>
                <div class="margin-top50">
                    <p>Category</p>
                </div>
                <select class="select_task" id="category" placeholder="Select task category" required>
                    <option>Select task category</option>
                    <option>New Category</option>
                    <option>Backoffice</option>
                    <option>Design</option>
                    <option>Marketing</option>
                    <option>Media</option>
                </select>
                <div class="margin-top50">
                    <p>Assignet to</p>
                </div>
                <select class="select_assign" id="assign" placeholder="Assignet to" required>
                    <option>Select contacts to assign</option>
                    <option>Janine Muster</option>
                    <option>Max Mustermann</option>
                    <option>Ilmar Kerner</option>
                </select>
            </div>
            <div class="bar">
                <img src="../img/bar.png">
            </div>
            <div class="right-task_popup">
                <div class="date">
                    <p>Due date</p>
                    <input type="date" placeholder="dd/mm/yyyy" id="date">
                </div>
                <div class="prio">
                    <p>Prio</p>
                    <div class="devision" id="devision">
                        <div onclick="changeImgUrgent()" class="urgent"><img id="urgent" src="../img/Urgentbuttonwhite.png"></div>
                        <div onclick="changeImgMedium()" class="medium"><img id="medium" src="../img/mediumbuttonwhite.png"></div>
                        <div onclick="changeImgLow()" class="low"><img id="low" src="../img/lowbuttonwhite.png"></div>
                    </div>
                </div>
                <p class="subtaskheader">Subtasks</p>
                <div class="subtask">
                    <input type="text" id="addNewSubtask" placeholder="Add new subtask"><img src="../img/addsubtask.png" id="addTask" onclick="addSubTask()">
                </div>
                <div class="subtasks" id="subtask">

                </div>
            </div>
            <div class="task_buttons">
                <button class="clear_button" id="clearButton" onclick="clearAddTask()">Clear<img
                        src="../img/clear.png"></button>
                <button class="create_button" id="createButton" onclick="createTask()">Create Task <img
                        src="..//img/create_task.png"></button>
            </div>
        </div>
    </div>
    <div class="menu_placeholder"></div>

    <div class="task_popup_window_2 d-none">
        <div class="closebutton">
            <img src="../img/clear.png">
        </div>
        <div class="task_popup_window_2_title">
            <h3>Title</h3>
            <input type="text" placeholder="Title....">
        </div>
        <div class="task_popup_window_2_description">
            <h3>Description</h3>
            <textarea id="descriptionTaskPopup" cols="30" rows="10" placeholder="Description...."></textarea>
        </div>
        <div class="task_popup_window_2_date">
            <h3>Due date</h3>
            <input type="date">
        </div>
        <div class="task_popup_window_2_prio">
            <h3>Prio</h3>
            <div class="task_popup_window_2_prio_images">
                <img src="../img/Urgentbuttonwhite.png">
                <img src="../img/mediumbuttonwhite.png">
                <img src="../img/lowbuttonwhite.png">
            </div>
        </div>
        <div class="task_popup_window_2_assign">
            <h3>Assigned to</h3>
            <select>
                <option value="select">Select contacts to assign</option>
                <option value="you">You</option>
                <option value="max">Max Mustermann</option>
                <option value="invite">Invite new Contact</option>
            </select>
        </div>
    </div>
</body>


</html>
