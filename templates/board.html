<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join</title>
    <script src="../JS/addtask.js"></script>
    <script src="../JS/script.js"></script>
    <script src="../JS/includeHTML.js"></script>
    <script src="../JS/addcontact.js"></script>
    
    <link rel="stylesheet" href="../styles/fonts.css">
    <link rel="stylesheet" href="../styles/response.css">
    <link rel="stylesheet" href="../styles/addTask.css">
    <link rel="stylesheet" href="../styles/addTaskPopup.css">
    <link rel="stylesheet" href="../styles/taskstyle.css">
    <link rel="stylesheet" href="../styles/menu.css">
    <link rel="stylesheet" href="../styles/board.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>





<body onload="includeHTML()">
    <div w3-include-html="menu.html"></div>
    <div w3-include-html="headerbar.html"></div>

    <div class="board_content_parent" id="boardContentParent">
        <div class="board_content">
            <div class="board_headline">
                <h1>
                    Board
                </h1>
                <div class="dFlex">
                    <div class="board_searchbar" id="boardSearchbar">
                        <input type="text" placeholder="Find Task">
                        <img src="../img/board_searchbar_icon.png">
                    </div>

                    <div class="board_add_task" id="boardAddTask">
                        <button onclick="openAddTaskPopup()">Add task</button>
                        <img src="../img/board_addTask_icon.png">
                    </div>
                </div>
            </div>


            <div class="board_overview">

                <div class="board_column">
                    <div class="board_column_headline">
                        <span>To Do</span>
                        <img src="../img/plus_button.png">
                    </div>
                    <div id="toDo" ondrop="moveTo('toDo')" ondragover="ondragover=(event)"
                        ondragend="removeDropPosition()">
                        <!-- Cards get filled here -->

                        <div id="toDoDropPosition" class="div_border dNone"></div>
                    </div>

                </div>

                <div class="board_column">
                    <div class="board_column_headline">
                        <span>In progress</span>
                        <img src="../img/plus_button.png">
                    </div>

                    <div id="inProgress" ondrop="moveTo('inProgress')" ondragover="ondragover=(event)">
                        <!-- Cards get filled here -->
                        <div id="testID" draggable="true" ondragstart="addDropPosition()"
                            ondragend="removeDropPosition()" class="task_card">
                            <span class="card_category" id="cardCategory">
                                Design
                            </span>
                            <span class="card_headline">
                                Website redesign
                            </span>
                            <span class="card_description">
                                Modify the contents of the main website test test test test
                            </span>
                            <div class="board_progress_row">
                                <div class="progress">
                                    <div class="progress-bar" role="progressbar" aria-label="Basic example"
                                        aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                                </div>
                                <div class="board_progress">
                                    1/2 Done
                                </div>

                            </div>
                            <div class="assinged_contacts_row">
                                <div class="initials_contacts">
                                    <div class="assinged_contacts1">IK</div>
                                    <div class="assinged_contacts2">DF</div>
                                    <div class="assinged_contacts3">LN</div>
                                </div>
                                <div class="urgency_icon">
                                    <img src="../img/medium.png">
                                </div>

                            </div>
                        </div>

                        <div id="inProgressDropPosition" class="div_border dNone"></div>

                    </div>
                </div>

                <div class="board_column">
                    <div class="board_column_headline">
                        <span>Awaiting Feedback</span>
                        <img src="../img/plus_button.png">
                    </div>
                    <div id="awaitingFeedback">
                        <!-- Cards get filled here -->

                        <div id="awaitingFeedbackDropPosition" class="div_border dNone"></div>
                    </div>
                </div>

                <div class="board_column">
                    <div class="board_column_headline">
                        <span>Done</span>
                        <img src="../img/plus_button.png">
                    </div>
                    <div id="done">
                        <!-- Cards get filled here -->

                        <div id="doneDropPosition" class="div_border dNone"></div>
                    </div>
                </div>

            </div>

        </div>
    </div>


</body>
