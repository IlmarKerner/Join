<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join</title>
    <script src="../JS/addtask.js"></script>
    <script src="../JS/script.js"></script>
    <script src="../JS/includeHTML.js"></script>
    <link rel="stylesheet" href="../styles/fonts.css">
    <link rel="stylesheet" href="../styles/response.css">
    <!-- <link rel="stylesheet" href="../styles/style.css"> -->
    <link rel="stylesheet" href="../styles/taskstyle.css">
    <link rel="stylesheet" href="../styles/menu.css">
    <link rel="stylesheet" href="../styles/summary.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
</head>

<body onload="includeHTML()">
    <div w3-include-html="menu.html"></div>
    <div w3-include-html="headerbar.html"></div>

    <!-- <div class="test">
        <div class="test_menu">

        </div>
        <div class="test_header">

        </div>
    </div> -->

    <div class="summary_content">
        <span class="summary_header">
            <h1><b>Summary</b></h1>
            <h4>Everything in a nutshell!</h2>
        </span>

        <div class="overview">
            <div class="overview_tasks">
                <div class="tasks_card">
                    <h1 id="tasksInBoard">
                        5
                    </h1>
                    <span>
                        Tasks in Board
                    </span>
                </div>
                <div class="tasks_card">
                    <h1 id="tasksInProgress">
                        2
                    </h1>
                    <span>
                        Tasks in Progress
                    </span>
                </div>
                <div class="tasks_card">
                    <h1 id="awaitingFeedback">
                        2
                    </h1>
                    <span>
                        Tasks in Progress
                    </span>
                </div>
            </div>

            <div class="urgent_card">
                <div class="sum_urgent_parent">
                    <img src="../img/urgent_icon.png">
                    <div class="sum_urgent">
                        <h2 id="urgent">
                            1
                        </h2>
                        <span>
                            Urgent
                        </span>
                    </div>
                </div>
                <div class="date_urgent_parent">
                    <span class="deadline_date" id="deadlineDate">
                        October 16, 2022
                    </span>
                    <span class="upcoming_deadline">
                        Upcoming Deadline
                    </span>
                </div>
            </div>


            <div class="progress_card_parent">
                <div class="progress_card">
                    <img src="../img/to-do_icon.png">
                    <div class="progress_child">
                        <h2 id="toDo">
                            1
                        </h2>
                        <span>
                            To-do
                        </span>
                    </div>
                </div>
                <div class="progress_card">
                    <img src="../img/done_icon.png">
                    <div class="progress_child">
                        <h2 id="done">
                            1
                        </h2>
                        <span>
                            Done
                        </span>
                    </div>
                </div>
            </div>


        </div>
    </div>

</body>


</html>
